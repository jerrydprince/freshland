<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <rect width="200" height="240" fill="#ffffff" />
  
  <!-- Outer green border -->
  <rect x="20" y="20" width="160" height="160" fill="none" stroke="#68b438" stroke-width="8" />
  
  <!-- Inner green square -->
  <rect x="36" y="36" width="128" height="128" fill="#68b438" />
  
  <!-- FLH Text -->
  <g fill="#ffffff">
    <!-- F -->
    <rect x="55" y="80" width="12" height="60" />
    <rect x="67" y="80" width="25" height="12" />
    <rect x="67" y="104" width="15" height="12" />
    
    <!-- L -->
    <rect x="90" y="60" width="10" height="70" />
    <rect x="90" y="118" width="25" height="12" />
    
    <!-- H -->
    <rect x="115" y="85" width="12" height="55" />
    <rect x="127" y="104" width="18" height="12" />
    <rect x="145" y="85" width="12" height="55" />
  </g>
  
  <!-- Exquisite home text -->
  <text x="100" y="210" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#2a2a2a" text-anchor="middle">Exquisite home</text>
  
  <!-- Bottom line -->
  <line x1="20" y1="230" x2="180" y2="230" stroke="#68b438" stroke-width="4" />
</svg>
